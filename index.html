<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>1RM Rechner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f2f2f7;
    }
    h1 {
      margin-top: 40px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: auto;
    }
    input, select, button {
      width: 90%;
      font-size: 18px;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      background: #007aff;
      color: white;
      border: none;
      font-weight: bold;
    }
    #result {
      font-size: 28px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>1RM Rechner</h1>

  <div class="card">
    <input type="number" id="weight" placeholder="Gewicht (kg)">
    <input type="number" id="reps" placeholder="Wiederholungen">

    <select id="formula">
      <option value="epley">Epley</option>
      <option value="brzycki">Brzycki</option>
      <option value="lombardi">Lombardi</option>
    </select>

    <button type="button" onclick="calculate()">Berechnen</button>

    <div id="result"></div>
  </div>

  <script>
    function calculate() {
      let weight = parseFloat(document.getElementById("weight").value);
      let reps = parseFloat(document.getElementById("reps").value);
      let formula = document.getElementById("formula").value;

      if (!weight || !reps) {
        document.getElementById("result").innerText = "Bitte Werte eingeben!";
        return;
      }

      let oneRM;

      if (formula === "epley") {
        oneRM = weight * (1 + reps / 30);
      } else if (formula === "brzycki") {
        oneRM = weight * (36 / (37 - reps));
      } else if (formula === "lombardi") {
        oneRM = weight * Math.pow(reps, 0.10);
      }

      oneRM = oneRM.toFixed(1);

      document.getElementById("result").innerText = "1RM: " + oneRM + " kg";
    }
  </script>

</body>
</html>
