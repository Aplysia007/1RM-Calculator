<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f2f2f7">
  <title>1RM Calculator</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f2f2f7;
      --text: #111111;
      --muted: #666666;
      --card: #ffffff;
      --input-bg: #ffffff;
      --input-border: #d1d1d6;
      --surface: #f7f7fa;
      --shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
      --button-bg: #007aff;
      --button-text: #ffffff;
    }
    body.dark {
      --bg: #000000;
      --text: #ffffff;
      --muted: #a1a1a6;
      --card: #1c1c1e;
      --input-bg: #2c2c2e;
      --input-border: #3a3a3c;
      --surface: #2c2c2e;
      --shadow: none;
      --button-bg: #0a84ff;
      --button-text: #ffffff;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      padding: 24px 16px 40px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 560px; margin: 0 auto; padding-top: 12px; }
    h1 { margin: 0 0 8px; font-size: 32px; text-align: center; }
    .subtitle {
      margin: 0 0 18px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    label {
      display: block;
      margin: 14px 0 8px;
      font-size: 15px;
      font-weight: 600;
      text-align: left;
    }
    input, select, button {
      width: 100%;
      min-height: 48px;
      font-size: 17px;
      border-radius: 12px;
    }
    input, select {
      padding: 12px 14px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
    }
    select {
      appearance: none;
      -webkit-appearance: none;
    }
    button {
      margin-top: 18px;
      border: 0;
      padding: 12px 16px;
      background: var(--button-bg);
      color: var(--button-text);
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
    .result {
      margin-top: 18px;
      padding: 14px 14px 14px 60px;
      border-radius: 14px;
      background: var(--surface);
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      position: relative;
    }
    .formula-label-main {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }
    .results-list {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    .result.large, .result-row.large {
      min-height: 72px;
      font-size: 24px;
      font-weight: 700;
    }
    .result-row.large .formula-name, .result-row.large .formula-value {
      font-size: 24px;
      font-weight: 700;
    }
    .math-eq { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; justify-content: center; }
    .math-eq .sup { vertical-align: super; font-size: 0.72em; }
    .math-eq .sub { vertical-align: sub; font-size: 0.72em; }
    .frac { display: inline-flex; flex-direction: column; align-items: center; line-height: 1.05; vertical-align: middle; margin: 0 2px; }
    .frac .top { padding: 0 4px 2px; border-bottom: 1.5px solid currentColor; }
    .frac .bottom { padding: 2px 4px 0; }
    .paren { font-size: 1.15em; line-height: 1; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .copyright {
      font-size: 12px;
      line-height: 1.3;
      color: var(--muted);
      padding-top: 6px;
    }
    .theme-toggle {
      width: 44px;
      min-width: 44px;
      min-height: 44px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--input-border);
      background: var(--card);
      color: var(--text);
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 0;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .formula-name { font-size: 16px; font-weight: 600; }
    .formula-value { font-size: 20px; font-weight: 700; white-space: nowrap; }
    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="copyright">©Birklbauer/Kösters (LV SM-Diagnostik)</div>
      <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle dark and light mode">☀️</button>
    </div>
    <h1>1RM Calculator</h1>
    <p class="subtitle">Estimate your 1RM based on the number of reps achieved at submaximal load, or estimate the number of reps at submaximal load based on your 1RM across multiple formulas.</p>

    <div class="card">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="rm">Load + Reps → 1RM</option>
        <option value="reps">Load + 1RM → Reps</option>
      </select>

      <div id="rmInputs">
        <label for="weight">Load [kg]</label>
        <input inputmode="decimal" type="number" step="0.5" min="0" id="weight" placeholder="e.g. 80">

        <label for="reps">Reps [n]</label>
        <input inputmode="decimal" type="number" step="1" min="0" id="reps" placeholder="e.g. 5">
      </div>

      <div id="repsInputs" style="display:none;">
        <label for="weight2">Load [kg]</label>
        <input inputmode="decimal" type="number" step="0.5" min="0" id="weight2" placeholder="e.g. 80">

        <label for="oneRmInput">1RM [kg]</label>
        <input inputmode="decimal" type="number" step="0.5" min="0" id="oneRmInput" placeholder="e.g. 95">
      </div>

      <label for="formula">Formula</label>
      <select id="formula">
        <option value="all">All formulas</option>
        <option value="average">Average</option>
        <option value="range">Range</option>
        <option value="ci95">CI95%</option>
        <option value="epley">Epley</option>
        <option value="brzycki">Brzycki</option>
        <option value="lombardi">Lombardi</option>
        <option value="oconner">O’Conner</option>
        <option value="adams">Adams</option>
        <option value="baechle">Baechle</option>
        <option value="berger">Berger</option>
        <option value="brown">Brown</option>
        <option value="landers">Landers</option>
        <option value="wathen">Wathen</option>
      </select>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px;">
        <button type="button" id="calcBtn" style="margin-top:0;">Calculate</button>
        <button type="button" id="holtenBtn" style="margin-top:0;">Holten diagram</button>
      </div>

      <div id="calculatorPage">
        <div class="result" id="result" aria-live="polite">Enter values</div>
        <div class="results-list" id="resultsList"></div>
      </div>
      <div id="holtenPage" style="display:none;">
        <div class="result-row" style="margin-top:18px; justify-content:center;">
          <canvas id="holtenCanvas" width="520" height="360" style="width:100%; max-width:100%; height:auto;"></canvas>
        </div>
        <div class="results-list" id="holtenInfo"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var modeSelect = document.getElementById("mode");
      var formulaSelect = document.getElementById("formula");
      var calcBtn = document.getElementById("calcBtn");
      var holtenBtn = document.getElementById("holtenBtn");
      var resultEl = document.getElementById("result");
      var resultsListEl = document.getElementById("resultsList");
      var calculatorPage = document.getElementById("calculatorPage");
      var holtenPage = document.getElementById("holtenPage");
      var holtenCanvas = document.getElementById("holtenCanvas");
      var holtenInfo = document.getElementById("holtenInfo");
      var rmInputs = document.getElementById("rmInputs");
      var repsInputs = document.getElementById("repsInputs");
      var themeToggle = document.getElementById("themeToggle");
      var bodyEl = document.body;

      var weightInput = document.getElementById("weight");
      var repsInput = document.getElementById("reps");
      var weight2Input = document.getElementById("weight2");
      var oneRmInput = document.getElementById("oneRmInput");

      var formulaNames = {
        epley: "Epley",
        baechle: "Baechle",
        brzycki: "Brzycki",
        berger: "Berger",
        lombardi: "Lombardi",
        brown: "Brown",
        oconner: "O’Conner",
        landers: "Landers",
        adams: "Adams",
        wathen: "Wathen"
      };

      function parseNumber(value) {
        if (typeof value !== "string") return NaN;
        return parseFloat(value.replace(",", "."));
      }

      function setMainResult(text, formulaName) {
        resultEl.innerHTML = "";

        if (formulaName) {
          var label = document.createElement("div");
          label.className = "formula-label-main";
          label.textContent = formulaName;
          resultEl.appendChild(label);
        }

        var value = document.createElement("div");
        value.textContent = text;
        value.style.width = "100%";
        value.style.textAlign = "center";

        resultEl.appendChild(value);
      }

      function clearList() {
        resultsListEl.innerHTML = "";
        resultEl.style.display = "flex";
        resultEl.classList.remove("large");
      }

      function setMainVisibility(visible) {
        resultEl.style.display = visible ? "flex" : "none";
      }

      function addFormulaRow(formulaText) {
        var row = document.createElement("div");
        row.className = "result-row";
        row.style.justifyContent = "center";

        var formula = document.createElement("div");
        formula.className = "formula-value";
        formula.innerHTML = formulaText;
        formula.style.whiteSpace = "normal";
        formula.style.textAlign = "center";
        formula.style.fontSize = "18px";
        formula.style.width = "100%";

        row.appendChild(formula);
        resultsListEl.appendChild(row);
      }

      function addLargeRangeRow(name, value) {
        var row = document.createElement("div");
        row.className = "result-row large";

        var left = document.createElement("div");
        left.className = "formula-name";
        left.textContent = name;

        var right = document.createElement("div");
        right.className = "formula-value";
        right.textContent = value;

        row.appendChild(left);
        row.appendChild(right);
        resultsListEl.appendChild(row);
      }

      function getFormulaExpression(key, mode) {
        var oneRmExpressions = {
          epley: '<span class="math-eq"><span>1RM</span><span>=</span><span>Load</span><span>×</span><span class="paren">(</span><span>1</span><span>+</span><span class="frac"><span class="top">Reps</span><span class="bottom">30</span></span><span class="paren">)</span></span>',
          baechle: '<span class="math-eq"><span>1RM</span><span>=</span><span>Load</span><span>×</span><span class="paren">(</span><span>1</span><span>+</span><span>0.033</span><span>×</span><span>Reps</span><span class="paren">)</span></span>',
          brzycki: '<span class="math-eq"><span>1RM</span><span>=</span><span class="frac"><span class="top">Load</span><span class="bottom">1.0278 − 0.0278 × Reps</span></span></span>',
          berger: '<span class="math-eq"><span>1RM</span><span>=</span><span class="frac"><span class="top">Load</span><span class="bottom">1.0261 − 0.0262 × Reps</span></span></span>',
          lombardi: '<span class="math-eq"><span>1RM</span><span>=</span><span>Load</span><span>×</span><span>Reps<span class="sup">0.10</span></span></span>',
          brown: '<span class="math-eq"><span>1RM</span><span>=</span><span>Load</span><span>×</span><span class="paren">(</span><span>1</span><span>+</span><span>0.0333</span><span>×</span><span>Reps</span><span class="paren">)</span></span>',
          oconner: '<span class="math-eq"><span>1RM</span><span>=</span><span>Load</span><span>×</span><span class="paren">(</span><span>1</span><span>+</span><span>0.025</span><span>×</span><span>Reps</span><span class="paren">)</span></span>',
          landers: '<span class="math-eq"><span>1RM</span><span>=</span><span class="frac"><span class="top">Load</span><span class="bottom">1.013 − 0.0267123 × Reps</span></span></span>',
          adams: '<span class="math-eq"><span>1RM</span><span>=</span><span class="frac"><span class="top">Load</span><span class="bottom">1 − 0.02 × Reps</span></span></span>',
          wathen: '<span class="math-eq"><span>1RM</span><span>=</span><span class="frac"><span class="top">100 × Load</span><span class="bottom">48.8 + 53.8 × e<span class="sup">−0.075 × Reps</span></span></span></span>'
        };
        var repsExpressions = {
          epley: '<span class="math-eq"><span>Reps</span><span>=</span><span>30</span><span>×</span><span class="paren">(</span><span class="frac"><span class="top">1RM</span><span class="bottom">Load</span></span><span>−</span><span>1</span><span class="paren">)</span></span>',
          baechle: '<span class="math-eq"><span>Reps</span><span>=</span><span class="frac"><span class="top"><span class="frac"><span class="top">1RM</span><span class="bottom">Load</span></span> − 1</span><span class="bottom">0.033</span></span></span>',
          brzycki: '<span class="math-eq"><span>Reps</span><span>=</span><span class="frac"><span class="top">1.0278 − <span class="frac"><span class="top">Load</span><span class="bottom">1RM</span></span></span><span class="bottom">0.0278</span></span></span>',
          berger: '<span class="math-eq"><span>Reps</span><span>=</span><span class="frac"><span class="top">1.0261 − <span class="frac"><span class="top">Load</span><span class="bottom">1RM</span></span></span><span class="bottom">0.0262</span></span></span>',
          lombardi: '<span class="math-eq"><span>Reps</span><span>=</span><span class="paren">(</span><span class="frac"><span class="top">1RM</span><span class="bottom">Load</span></span><span class="paren">)</span><span class="sup">10</span></span>',
          brown: '<span class="math-eq"><span>Reps</span><span>=</span><span class="frac"><span class="top"><span class="frac"><span class="top">1RM</span><span class="bottom">Load</span></span> − 1</span><span class="bottom">0.0333</span></span></span>',
          oconner: '<span class="math-eq"><span>Reps</span><span>=</span><span class="frac"><span class="top"><span class="frac"><span class="top">1RM</span><span class="bottom">Load</span></span> − 1</span><span class="bottom">0.025</span></span></span>',
          landers: '<span class="math-eq"><span>Reps</span><span>=</span><span class="frac"><span class="top">1.013 − <span class="frac"><span class="top">Load</span><span class="bottom">1RM</span></span></span><span class="bottom">0.0267123</span></span></span>',
          adams: '<span class="math-eq"><span>Reps</span><span>=</span><span class="frac"><span class="top">1 − <span class="frac"><span class="top">Load</span><span class="bottom">1RM</span></span></span><span class="bottom">0.02</span></span></span>',
          wathen: '<span class="math-eq"><span>Reps</span><span>=</span><span class="frac"><span class="top">−ln<span class="paren">(</span><span class="frac"><span class="top"><span class="frac"><span class="top">100 × Load</span><span class="bottom">1RM</span></span> − 48.8</span><span class="bottom">53.8</span></span><span class="paren">)</span></span><span class="bottom">0.075</span></span></span>'
        };
        return mode === "rm" ? oneRmExpressions[key] : repsExpressions[key];
      }

      function applyTheme(theme) {
        var dark = theme === "dark";
        bodyEl.classList.toggle("dark", dark);
        themeToggle.textContent = dark ? "☀️" : "🌙";
        try { localStorage.setItem("rm-theme", theme); } catch (e) {}
      }

      function addListRow(name, value) {
        var row = document.createElement("div");
        row.className = "result-row";

        var left = document.createElement("div");
        left.className = "formula-name";
        left.textContent = name;

        var right = document.createElement("div");
        right.className = "formula-value";
        right.textContent = value;

        row.appendChild(left);
        row.appendChild(right);
        resultsListEl.appendChild(row);
      }

      function formatKg(value) {
        return value.toFixed(1) + " kg";
      }

      function formatReps(value) {
        return value.toFixed(1) + " reps";
      }

      function showCalculatorPage() {
        calculatorPage.style.display = "";
        holtenPage.style.display = "none";
        calcBtn.textContent = "Calculate";
      }

      function showHoltenPage() {
        calculatorPage.style.display = "none";
        holtenPage.style.display = "";
        calcBtn.textContent = "Back to calculation";
      }

      function clearHoltenInfo() {
        holtenInfo.innerHTML = "";
      }

      function getSelectedFormulaKey() {
        var selected = formulaSelect.value;
        var blocked = ["all", "average", "range", "ci95"];
        if (blocked.indexOf(selected) !== -1) return null;
        return selected;
      }

      function getPercentPoints() {
        var points = [];
        for (var p = 65; p <= 100; p += 5) points.push(p);
        return points;
      }

      function formulaWeightFromPercent(oneRM, percent) {
        return oneRM * percent / 100;
      }

      function getOneRMForDiagram() {
        if (modeSelect.value === "rm") {
          var weight = parseNumber(weightInput.value);
          var reps = parseNumber(repsInput.value);
          var selected = getSelectedFormulaKey();
          if (!validPositive(weight) || !validPositive(reps) || !selected) return NaN;
          return oneRmFormulas(weight, reps)[selected];
        } else {
          var oneRM = parseNumber(oneRmInput.value);
          var load = parseNumber(weight2Input.value);
          var selected = getSelectedFormulaKey();
          if (!validPositive(load) || !validPositive(oneRM) || oneRM < load || !selected) return NaN;
          return oneRM;
        }
      }

      function getCurrentLoadAndRepsForDiagram(selected, oneRM) {
        if (modeSelect.value === "rm") {
          var load = parseNumber(weightInput.value);
          var reps = parseNumber(repsInput.value);
          return { load: load, reps: reps };
        }
        var load2 = parseNumber(weight2Input.value);
        var repsCalc = repsFormulas(load2, oneRM)[selected];
        return { load: load2, reps: repsCalc };
      }

      function drawHoltenDiagram(selected) {
        var oneRM = getOneRMForDiagram();
        if (!validPositive(oneRM)) {
          setMainResult("Please enter valid values");
          showCalculatorPage();
          return;
        }

        var current = getCurrentLoadAndRepsForDiagram(selected, oneRM);
        if (!validPositive(current.load) || !validPositive(current.reps)) {
          setMainResult("Please enter valid values");
          showCalculatorPage();
          return;
        }

        var levels = [100, 95, 90, 85, 80, 75, 70, 65];
        var values = levels.map(function (percent) {
          var loadAtPercent = formulaWeightFromPercent(oneRM, percent);
          var repsAtPercent = repsFormulas(loadAtPercent, oneRM)[selected];
          return {
            percent: percent,
            load: loadAtPercent,
            reps: repsAtPercent
          };
        });

        var ctx = holtenCanvas.getContext("2d");
        var width = holtenCanvas.width;
        var height = holtenCanvas.height;
        var padL = 28, padR = 28, padT = 20, padB = 20;

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, width, height);

        var topX = width / 2;
        var topY = padT + 14;
        var bottomY = height - padB - 8;
        var leftX = padL + 18;
        var rightX = width - padR - 18;

        function yForPercent(percent) {
          return topY + ((100 - percent) / (100 - 65)) * (bottomY - topY);
        }

        function leftBoundAtY(y) {
          var t = (y - topY) / (bottomY - topY);
          return topX + (leftX - topX) * t;
        }

        function rightBoundAtY(y) {
          var t = (y - topY) / (bottomY - topY);
          return topX + (rightX - topX) * t;
        }

        // horizontal levels
        ctx.strokeStyle = "#9a9a9a";
        ctx.lineWidth = 1.2;
        ctx.font = "12px Arial";
        ctx.fillStyle = "#333333";

        values.forEach(function (d) {
          var y = yForPercent(d.percent);
          ctx.beginPath();
          ctx.moveTo(leftX, y);
          ctx.lineTo(rightX, y);
          ctx.stroke();

          ctx.fillText(d.percent + "%", leftX + 4, y - 6);

          var repsLabel = isFinite(d.reps) && d.reps > 0 ? d.reps.toFixed(1) : "";
          var metrics = ctx.measureText(repsLabel);
          ctx.fillText(repsLabel, rightX - metrics.width - 4, y - 6);
        });

        // headings
        ctx.font = "bold 12px Arial";
        ctx.fillText("1RM", leftX + 2, topY - 18);
        var heading = "Reps [n]";
        var hm = ctx.measureText(heading);
        ctx.fillText(heading, rightX - hm.width, topY - 18);

        // pyramid outline
        ctx.strokeStyle = "#666666";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(topX, topY);
        ctx.lineTo(leftX, bottomY);
        ctx.lineTo(rightX, bottomY);
        ctx.closePath();
        ctx.stroke();

        // Current red line marker
        var currentPercent = current.load / oneRM * 100;
        if (currentPercent >= 65 && currentPercent <= 100 && isFinite(current.reps)) {
          var cy = yForPercent(currentPercent);
          var lx = leftBoundAtY(cy);
          var rx = rightBoundAtY(cy);

          // horizontal red line through pyramid at current percentage
          ctx.strokeStyle = "#ff3b30";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(lx, cy);
          ctx.lineTo(rx, cy);
          ctx.stroke();

          // display reps as large red bold text OUTSIDE the red line (right side)
          var repsText = current.reps.toFixed(1);
          ctx.fillStyle = "#ff3b30";
          ctx.font = "bold 18px Arial";
          var rTextWidth = ctx.measureText(repsText).width;
          // place slightly OUTSIDE right boundary
          ctx.fillText(repsText, rx + 6, cy - 6);

          // display %1RM as large red bold text OUTSIDE the red line (left side)
          var pctText = currentPercent.toFixed(1);
          var pTextWidth = ctx.measureText(pctText).width;
          // place slightly OUTSIDE left boundary
          ctx.fillText(pctText, lx - pTextWidth - 6, cy - 6);
        }

        clearHoltenInfo();
        addHoltenInfoRow("1RM", formatKg(oneRM));
        addHoltenInfoRow("%1RM", currentPercent.toFixed(1) + " %");
        addHoltenInfoRow("Load", formatKg(current.load));
        addHoltenInfoRow("Reps", formatReps(current.reps));
        showHoltenPage();
      }

      function addHoltenInfoRow(name, value) {
        var row = document.createElement("div");
        row.className = "result-row";

        var left = document.createElement("div");
        left.className = "formula-name";
        left.textContent = name;

        var right = document.createElement("div");
        right.className = "formula-value";
        right.textContent = value;

        row.appendChild(left);
        row.appendChild(right);
        holtenInfo.appendChild(row);
      }

      function validPositive(value) {
        return isFinite(value) && value > 0;
      }

      function oneRmFormulas(weight, reps) {
        return {
          epley: weight * (1 + reps / 30),
          baechle: weight * (1 + 0.033 * reps),
          brzycki: weight / (1.0278 - 0.0278 * reps),
          berger: weight / (1.0261 - 0.0262 * reps),
          lombardi: weight * Math.pow(reps, 0.10),
          brown: weight * (1 + 0.0333 * reps),
          oconner: weight * (1 + 0.025 * reps),
          landers: weight / (1.013 - 0.0267123 * reps),
          adams: weight / (1 - 0.02 * reps),
          wathen: (100 * weight) / (48.8 + 53.8 * Math.exp(-0.075 * reps))
        };
      }

      function repsFormulas(weight, oneRM) {
        var ratio = oneRM / weight;
        return {
          epley: 30 * (ratio - 1),
          baechle: (ratio - 1) / 0.033,
          brzycki: (1.0278 - (weight / oneRM)) / 0.0278,
          berger: (1.0261 - (weight / oneRM)) / 0.0262,
          lombardi: Math.pow(ratio, 10),
          brown: (ratio - 1) / 0.0333,
          oconner: (ratio - 1) / 0.025,
          landers: (1.013 - (weight / oneRM)) / 0.0267123,
          adams: (1 - (weight / oneRM)) / 0.02,
          wathen: -Math.log(((100 * weight / oneRM) - 48.8) / 53.8) / 0.075
        };
      }

      function validValuesArray(values) {
        return Object.keys(values)
          .map(function (key) { return values[key]; })
          .filter(function (v) { return isFinite(v) && v > 0; });
      }

      function averageOfValid(values) {
        var arr = validValuesArray(values);
        if (!arr.length) return NaN;
        var sum = arr.reduce(function (a, b) { return a + b; }, 0);
        return sum / arr.length;
      }

      function rangeOfValid(values) {
        var arr = validValuesArray(values);
        if (!arr.length) return null;
        return {
          min: Math.min.apply(null, arr),
          max: Math.max.apply(null, arr)
        };
      }

      function stdDevSample(arr) {
        if (!arr || arr.length < 2) return NaN;
        var mean = arr.reduce(function (a, b) { return a + b; }, 0) / arr.length;
        var variance = arr.reduce(function (acc, value) {
          var diff = value - mean;
          return acc + diff * diff;
        }, 0) / (arr.length - 1);
        return Math.sqrt(variance);
      }

      function ci95OfValid(values) {
        var arr = validValuesArray(values);
        if (!arr.length) return null;
        var mean = arr.reduce(function (a, b) { return a + b; }, 0) / arr.length;
        if (arr.length === 1) {
          return { lower: mean, upper: mean };
        }
        var sd = stdDevSample(arr);
        var se = sd / Math.sqrt(arr.length);
        var margin = 1.96 * se;
        return {
          lower: mean - margin,
          upper: mean + margin
        };
      }

      function switchMode() {
        showCalculatorPage();
        clearList();
        if (modeSelect.value === "rm") {
          rmInputs.style.display = "";
          repsInputs.style.display = "none";
          formulaSelect.innerHTML = `
            <option value="all">All formulas</option>
                        <option value="average">Average Reps</option>
                        <option value="range">Range</option>
                        <option value="ci95">CI95%</option>
                        <option value="epley">Epley</option>
                        <option value="brzycki">Brzycki</option>
                        <option value="lombardi">Lombardi</option>
                        <option value="oconner">O’Conner</option>
                        <option value="adams">Adams</option>
                        <option value="baechle">Baechle</option>
                        <option value="berger">Berger</option>
                        <option value="brown">Brown</option>
                        <option value="landers">Landers</option>
                        <option value="wathen">Wathen</option>
          `;
          setMainResult("Enter Load and Reps");
        } else {
          rmInputs.style.display = "none";
          repsInputs.style.display = "";
          formulaSelect.innerHTML = `
            <option value="all">All formulas</option>
            <option value="average">Average Reps</option>
            <option value="range">Range</option>
            <option value="ci95">CI95%</option>
            <option value="epley">Epley</option>
            <option value="baechle">Baechle</option>
            <option value="brzycki">Brzycki</option>
            <option value="berger">Berger</option>
            <option value="lombardi">Lombardi</option>
            <option value="brown">Brown</option>
            <option value="oconner">O’Conner</option>
            <option value="landers">Landers</option>
            <option value="adams">Adams</option>
            <option value="wathen">Wathen</option>
          `;
          setMainResult("Enter Load and 1RM");
        }
      }

      function calculate1RM() {
        var weight = parseNumber(weightInput.value);
        var reps = parseNumber(repsInput.value);
        var selected = formulaSelect.value;

        if (!validPositive(weight) || !validPositive(reps)) {
          setMainResult("Please enter valid values");
          return;
        }

        var values = oneRmFormulas(weight, reps);

        if (selected === "all") {
          var avgAll = averageOfValid(values);
          var rangeAll = rangeOfValid(values);
          var ciAll = ci95OfValid(values);
          setMainResult("Average: " + formatKg(avgAll));
          addListRow("Range", formatKg(rangeAll.min) + " – " + formatKg(rangeAll.max));
          addListRow("CI95%", formatKg(ciAll.lower) + " – " + formatKg(ciAll.upper));
          ["epley","brzycki","lombardi","oconner","adams","baechle","berger","brown","landers","wathen"].forEach(function (key) {
            var value = values[key];
            addListRow(formulaNames[key], validPositive(value) ? formatKg(value) : "not valid");
          });
          return;
        }

        if (selected === "average") {
          var average = averageOfValid(values);
          if (!validPositive(average)) {
            setMainResult("Not valid with these values");
            return;
          }
          setMainResult(formatKg(average));
          return;
        }

        if (selected === "range") {
          var range = rangeOfValid(values);
          if (!range) {
            setMainResult("Not valid with these values");
            return;
          }
          setMainVisibility(false);
          addLargeRangeRow("Min", formatKg(range.min));
          addLargeRangeRow("Max", formatKg(range.max));
          return;
        }

        if (selected === "ci95") {
          var ci = ci95OfValid(values);
          if (!ci) {
            setMainResult("Not valid with these values");
            return;
          }
          setMainVisibility(false);
          addLargeRangeRow("Lower", formatKg(ci.lower));
          addLargeRangeRow("Upper", formatKg(ci.upper));
          return;
        }

        var result = values[selected];
        if (!validPositive(result)) {
          setMainResult("Not valid with these values");
          return;
        }

        setMainResult(formatKg(result), formulaNames[selected] || null);
        addFormulaRow(getFormulaExpression(selected, "rm"));
      }

      function calculateReps() {
        var weight = parseNumber(weight2Input.value);
        var oneRM = parseNumber(oneRmInput.value);
        var selected = formulaSelect.value;

        if (!validPositive(weight) || !validPositive(oneRM)) {
          setMainResult("Please enter valid values");
          return;
        }

        if (oneRM < weight) {
          setMainResult("1RM must be at least as high as Load");
          return;
        }

        var values = repsFormulas(weight, oneRM);

        if (selected === "all") {
          var avgAll = averageOfValid(values);
          var rangeAll = rangeOfValid(values);
          var ciAll = ci95OfValid(values);
          setMainResult(formatReps(avgAll));
          addListRow("Range", formatReps(rangeAll.min) + " – " + formatReps(rangeAll.max));
          addListRow("CI95%", formatReps(ciAll.lower) + " – " + formatReps(ciAll.upper));
          ["epley","brzycki","lombardi","oconner","adams","baechle","berger","brown","landers","wathen"].forEach(function (key) {
            var value = values[key];
            addListRow(formulaNames[key], validPositive(value) ? formatReps(value) : "not valid");
          });
          return;
        }

        if (selected === "average") {
          var average = averageOfValid(values);
          if (!validPositive(average)) {
            setMainResult("Not valid with these values");
            return;
          }
          setMainResult(formatReps(average));
          return;
        }

        if (selected === "range") {
          var range = rangeOfValid(values);
          if (!range) {
            setMainResult("Not valid with these values");
            return;
          }
          setMainVisibility(false);
          addLargeRangeRow("Min", formatReps(range.min));
          addLargeRangeRow("Max", formatReps(range.max));
          return;
        }

        if (selected === "ci95") {
          var ci = ci95OfValid(values);
          if (!ci) {
            setMainResult("Not valid with these values");
            return;
          }
          setMainVisibility(false);
          addLargeRangeRow("Lower", formatReps(ci.lower));
          addLargeRangeRow("Upper", formatReps(ci.upper));
          return;
        }

        var result = values[selected];
        if (!validPositive(result)) {
          setMainResult("Not valid with these values");
          return;
        }

        setMainResult(formatReps(result), formulaNames[selected] || null);
        addFormulaRow(getFormulaExpression(selected, "reps"));
      }

      function calculate() {
        showCalculatorPage();
        calcBtn.textContent = "Calculate";
        clearList();
        if (modeSelect.value === "rm") {
          calculate1RM();
        } else {
          calculateReps();
        }
      }


      holtenBtn.addEventListener("click", function () {
        var selected = getSelectedFormulaKey();
        if (!selected) {
          setMainResult('Select formula');
          showCalculatorPage();
          return;
        }
        drawHoltenDiagram(selected);
      });

      modeSelect.addEventListener("change", switchMode);
      calcBtn.addEventListener("click", calculate);
      calcBtn.addEventListener("touchend", function (event) {
        event.preventDefault();
        calculate();
      }, { passive: false });

      [weightInput, repsInput, weight2Input, oneRmInput].forEach(function (el) {
        el.addEventListener("keydown", function (event) {
          if (event.key === "Enter") calculate();
        });
      });

      themeToggle.addEventListener("click", function () {
        applyTheme(bodyEl.classList.contains("dark") ? "light" : "dark");
      });

      var savedTheme = null;
      try { savedTheme = localStorage.getItem("rm-theme"); } catch (e) {}
      if (savedTheme === "dark" || savedTheme === "light") {
        applyTheme(savedTheme);
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        applyTheme("dark");
      } else {
        applyTheme("light");
      }

      switchMode();
    })();
  </script>
</body>
